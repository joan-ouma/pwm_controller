project:
  title: "8-bit Hardware PWM Controller"
  author: "Joan Ouma"
  discord: ""
  description: "A hardware-based PWM generator with 8-bit duty cycle control."
  how_it_works: "Uses an 8-bit counter and comparator to generate PWM waves."
  how_to_test: "Set ui_in to a value and observe uo_out[0] with a logic analyzer."
  language: "Verilog"
  clock_hz: 50000000
  tiles: "1x1"
  top_module: "tt_um_example"
  source_files:
    - "project.v"

pinout:
  ui[0]: "Duty Cycle Bit 0"
  ui[1]: "Duty Cycle Bit 1"
  ui[2]: "Duty Cycle Bit 2"
  ui[3]: "Duty Cycle Bit 3"
  ui[4]: "Duty Cycle Bit 4"
  ui[5]: "Duty Cycle Bit 5"
  ui[6]: "Duty Cycle Bit 6"
  ui[7]: "Duty Cycle Bit 7"
  uo[0]: "PWM Output"
  uo[1]: ""
  uo[2]: ""
  uo[3]: ""
  uo[4]: ""
  uo[5]: ""
  uo[6]: ""
  uo[7]: ""
  uio[0]: ""
  uio[1]: ""
  uio[2]: ""
  uio[3]: ""
  uio[4]: ""
  uio[5]: ""
  uio[6]: ""
  uio[7]: ""

yaml_version: 6
